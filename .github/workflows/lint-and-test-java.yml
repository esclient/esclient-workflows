name: "lint and test java"

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        required: false
        default: "17"
      java-distribution:
        type: string
        required: false
        default: "temurin"

jobs:
  lint-and-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Ensure Maven Wrapper exists and is executable
        run: |
          if [ ! -f "./mvnw" ] || [ ! -f "./.mvn/wrapper/maven-wrapper.properties" ]; then
            echo "Maven wrapper missing, generating..."
            mvn wrapper:wrapper
          fi
          chmod +x ./mvnw
          echo "MAVEN_CMD=./mvnw" >> $GITHUB_ENV

      - name: Install dependencies
        run: ${{ env.MAVEN_CMD }} dependency:resolve

      - name: Run static analysis (Checkstyle, SpotBugs, PMD, Spotless)
        run: MAVEN_OPTS="-Dpmd.failOnViolation=false" ${{ env.MAVEN_CMD }} clean verify -Pquality
        # disables PMD fail on violations, workflow won’t fail due to lint

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Ensure Maven Wrapper exists and is executable
        run: |
          if [ ! -f "./mvnw" ] || [ ! -f "./.mvn/wrapper/maven-wrapper.properties" ]; then
            echo "Maven wrapper missing, generating..."
            mvn wrapper:wrapper
          fi
          chmod +x ./mvnw
          echo "MAVEN_CMD=./mvnw" >> $GITHUB_ENV

      - name: Install dependencies
        run: ${{ env.MAVEN_CMD }} dependency:resolve

      - name: Run tests and generate coverage
        run: ${{ env.MAVEN_CMD }} clean verify -DskipTests=false -Pcoverage
        # Assumes you have a 'coverage' profile that runs JaCoCo

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./target/site/jacoco/jacoco.xml
          fail_ci_if_error: false
